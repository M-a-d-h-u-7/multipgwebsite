<div class="toast" id="toast">Added to bag</div>
 
<script>
/* ── DATA ── */
const products = [
  { id:1,  name:'Void Oversized Tee',       cat:'Tops',       price:2499,  emoji:'🖤', desc:'A 100% organic cotton tee with an intentionally oversized silhouette. Pre-washed for a lived-in feel.', sizes:['XS','S','M','L','XL'], colors:['Onyx','Slate'], featured:true  },
  { id:2,  name:'Mineral Linen Trousers',   cat:'Bottoms',    price:5999,  emoji:'🤍', desc:'Hand-loomed linen with a wide, relaxed leg. Elastic waist, side seam pockets, and an ankle-grazing hem.', sizes:['XS','S','M','L'], colors:['Ecru','Stone'], featured:true  },
  { id:3,  name:'Dusk Knit Cardigan',       cat:'Layers',     price:7499,  emoji:'🌑', desc:'A loose-knit merino wool cardigan. Dropped shoulders, ribbed cuffs, and a clean V-neck.', sizes:['S','M','L','XL'], colors:['Charcoal','Ivory'], featured:true  },
  { id:4,  name:'Silk Slip Dress',          cat:'Dresses',    price:8999,  emoji:'🪨', desc:'Bias-cut recycled silk slip. Adjustable spaghetti straps. Wear alone or layered.', sizes:['XS','S','M','L'], colors:['Fog','Obsidian'], featured:true  },
  { id:5,  name:'Cargo Wide-Leg Pants',     cat:'Bottoms',    price:6499,  emoji:'⬛', desc:'Technical cotton twill with multiple utility pockets. Relaxed through the thigh and tapered at the ankle.', sizes:['S','M','L','XL'], colors:['Black','Olive'], featured:false },
  { id:6,  name:'Raw Hem Denim Jacket',     cat:'Layers',     price:9999,  emoji:'🔲', desc:'Unfinished hem denim jacket in a vintage 12oz wash. A true wardrobe foundation.', sizes:['XS','S','M','L','XL'], colors:['Indigo','Black'], featured:false },
  { id:7,  name:'Minimalist Bucket Hat',    cat:'Accessories',price:2299,  emoji:'◉',  desc:'Structured cotton bucket hat with a subtle tonal logo. Packable and UV-protective.', sizes:['One Size'], colors:['Black','Beige'], featured:false },
  { id:8,  name:'Woven Leather Belt',       cat:'Accessories',price:3499,  emoji:'◈',  desc:'Handwoven leather belt with a matte metal pin buckle. Ages beautifully.', sizes:['S/M','M/L'], colors:['Black','Tan'], featured:false },
  { id:9,  name:'Ribbed Cami',              cat:'Tops',       price:1899,  emoji:'🩶', desc:'Fine-rib stretch cotton cami. Clean straps, slim fit — the perfect layer base.', sizes:['XS','S','M','L'], colors:['White','Black','Clay'], featured:false },
  { id:10, name:'Structured Tote',          cat:'Accessories',price:5499,  emoji:'🖤', desc:'Canvas tote with leather handles and a contrast interior. Holds everything you need.', sizes:['One Size'], colors:['Ecru','Black'], featured:false },
];
 
let cart = [];
let currentCategory = 'All';
let currentProductId = null;
 
/* ── PAGE ROUTING ── */
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const nl = document.getElementById('nav-' + name);
  if (nl) nl.classList.add('active');
  if (name === 'shop') renderShop();
  if (name === 'cart') renderCart();
  if (name === 'checkout') renderCheckout();
}
 
/* ── CART LOGIC ── */
function addToCart(productId, size, color) {
  const p = products.find(x => x.id === productId);
  if (!p) return;
  const existing = cart.find(i => i.id === productId && i.size === size && i.color === color);
  if (existing) existing.qty++;
  else cart.push({ ...p, size, color, qty: 1 });
  updateCartCount();
  showToast('Added to bag ✦');
}
 
function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartCount();
  renderCart();
}
 
function changeQty(idx, delta) {
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  renderCart();
}
 
function cartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }
function updateCartCount() { document.getElementById('cart-count').textContent = cart.reduce((s, i) => s + i.qty, 0); }
 
/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
 
/* ── RENDER PRODUCT CARD ── */
function renderCard(p) {
  return `<div class="product-card" onclick="showDetail(${p.id})">
    <div class="product-img">${p.emoji}</div>
    <div class="product-body">
      <p class="product-cat">${p.cat}</p>
      <h3 class="product-name">${p.name}</h3>
      <div class="product-footer">
        <span class="product-price">₹${p.price.toLocaleString('en-IN')}</span>
        <button class="add-btn" onclick="event.stopPropagation(); quickAdd(${p.id})">+ Add</button>
      </div>
    </div>
  </div>`;
}
 
function quickAdd(id) {
  const p = products.find(x => x.id === id);
  addToCart(id, p.sizes[0], p.colors[0]);
}
 
/* ── HOME FEATURED ── */
const fg = document.getElementById('featured-grid');
products.filter(p => p.featured).forEach(p => fg.innerHTML += renderCard(p));
 
/* ── SHOP PAGE ── */
function renderShop(cat) {
  if (cat) currentCategory = cat;
  const cats = ['All', ...new Set(products.map(p => p.cat))];
  const fb = document.getElementById('filter-bar');
  fb.innerHTML = cats.map(c => `<button class="filter-btn ${c === currentCategory ? 'active' : ''}" onclick="renderShop('${c}')">${c}</button>`).join('');
  const list = currentCategory === 'All' ? products : products.filter(p => p.cat === currentCategory);
  document.getElementById('shop-grid').innerHTML = list.map(renderCard).join('');
}
 
/* ── PRODUCT DETAIL ── */
function showDetail(id) {
  currentProductId = id;
  const p = products.find(x => x.id === id);
  document.getElementById('pd-gallery').textContent = p.emoji;
  document.getElementById('pd-gallery').style.fontSize = '10rem';
  let selectedSize = p.sizes[0];
  let selectedColor = p.colors[0];
 
  function render() {
    document.getElementById('pd-info').innerHTML = `
      <p class="pd-breadcrumb" onclick="showPage('shop')">← Back to Shop</p>
      <p class="pd-cat">${p.cat}</p>
      <h1 class="pd-title">${p.name}</h1>
      <p class="pd-price">₹${p.price.toLocaleString('en-IN')}</p>
      <p class="pd-desc">${p.desc}</p>
      <div class="pd-options">
        <p class="pd-option-label">Size</p>
        <div class="pd-option-btns">
          ${p.sizes.map(s => `<button class="opt-btn ${s === selectedSize ? 'selected' : ''}" onclick="selectSize('${s}')">${s}</button>`).join('')}
        </div>
      </div>
      <div class="pd-options">
        <p class="pd-option-label">Colour</p>
        <div class="pd-option-btns">
          ${p.colors.map(c => `<button class="opt-btn ${c === selectedColor ? 'selected' : ''}" onclick="selectColor('${c}')">${c}</button>`).join('')}
        </div>
      </div>
      <div class="pd-actions">
        <button class="pd-add" onclick="addToCart(${p.id}, '${selectedSize}', '${selectedColor}')">Add to Bag</button>
        <button class="pd-wishlist" title="Wishlist">♡</button>
      </div>
      <div class="pd-meta">
        <div class="pd-meta-row"><span class="pd-meta-key">Material</span><span>Organic Cotton / Linen Blend</span></div>
        <div class="pd-meta-row"><span class="pd-meta-key">Fit</span><span>Relaxed / Oversized</span></div>
        <div class="pd-meta-row"><span class="pd-meta-key">Origin</span><span>Made in India</span></div>
        <div class="pd-meta-row"><span class="pd-meta-key">Care</span><span>Cold wash, line dry</span></div>
      </div>`;
  }
 
  window.selectSize = (s) => { selectedSize = s; render(); };
  window.selectColor = (c) => { selectedColor = c; render(); };
  render();
  showPage('detail');
}
 
/* ── CART PAGE ── */
function renderCart() {
  const list = document.getElementById('cart-items-list');
  const summary = document.getElementById('cart-summary');
  if (cart.length === 0) {
    list.innerHTML = `<div class="empty-cart">
      <div class="empty-cart-icon">◻</div>
      <p class="empty-cart-msg">Your bag is empty</p>
      <p class="empty-cart-sub">Discover pieces crafted to last.</p>
      <button class="btn btn-primary" onclick="showPage('shop')">Shop Now</button>
    </div>`;
    summary.innerHTML = '';
    return;
  }
  list.innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="cart-item-img">${item.emoji}</div>
      <div class="cart-item-info">
        <p class="cart-item-name">${item.name}</p>
        <p class="cart-item-variant">${item.size} · ${item.color}</p>
        <p class="cart-item-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</p>
        <div class="cart-item-actions">
          <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
          <button class="remove-btn" onclick="removeFromCart(${i})">Remove</button>
        </div>
      </div>
    </div>`).join('');
 
  const total = cartTotal();
  const shipping = total >= 4999 ? 0 : 199;
  summary.innerHTML = `
    <div class="order-summary">
      <p class="summary-title">Order Summary</p>
      <div class="summary-row"><span class="summary-label">Subtotal</span><span>₹${total.toLocaleString('en-IN')}</span></div>
      <div class="summary-row"><span class="summary-label">Shipping</span><span>${shipping === 0 ? 'Free' : '₹' + shipping}</span></div>
      <div class="summary-row"><span class="summary-label">Tax (GST 5%)</span><span>₹${Math.round(total * 0.05).toLocaleString('en-IN')}</span></div>
      <p class="summary-total">₹${(total + shipping + Math.round(total * 0.05)).toLocaleString('en-IN')}</p>
      <button class="checkout-btn" onclick="showPage('checkout')">Proceed to Checkout</button>
    </div>`;
}
 
/* ── CHECKOUT PAGE ── */
function renderCheckout() {
  if (cart.length === 0) { showPage('shop'); return; }
  const total = cartTotal();
  const shipping = total >= 4999 ? 0 : 199;
  const grand = total + shipping + Math.round(total * 0.05);
 
  document.getElementById('checkout-form-area').innerHTML = `
    <p class="form-section-title">Contact</p>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" placeholder="your@email.com" id="cf-email"></div>
    <p class="form-section-title">Shipping</p>
    <div class="form-row">
      <div class="form-group"><label class="form-label">First Name</label><input class="form-input" placeholder="Arya" id="cf-fname"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" placeholder="Sharma" id="cf-lname"></div>
    </div>
    <div class="form-group"><label class="form-label">Address</label><input class="form-input" placeholder="12, MG Road, Indiranagar"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">City</label><input class="form-input" placeholder="Bengaluru"></div>
      <div class="form-group"><label class="form-label">PIN Code</label><input class="form-input" placeholder="560038"></div>
    </div>
    <p class="form-section-title">Payment</p>
    <div class="form-group"><label class="form-label">Card Number</label><input class="form-input" placeholder="4242 4242 4242 4242" maxlength="19" oninput="fmtCard(this)"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Expiry</label><input class="form-input" placeholder="MM / YY" maxlength="7" oninput="fmtExpiry(this)"></div>
      <div class="form-group"><label class="form-label">CVV</label><input class="form-input" placeholder="•••" maxlength="3" type="password"></div>
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:1.5rem; padding:1rem;" onclick="placeOrder()">Place Order · ₹${grand.toLocaleString('en-IN')}</button>`;
 
  document.getElementById('checkout-summary').innerHTML = `
    <div class="order-review">
      <p style="font-family:'Cormorant Garamond',serif; font-size:1.2rem; margin-bottom:1.25rem; font-weight:300;">Items (${cart.reduce((s,i)=>s+i.qty,0)})</p>
      ${cart.map(item => `<div class="order-review-item">
        <span class="order-review-emoji">${item.emoji}</span>
        <span class="order-review-name">${item.name}<br><span style="color:var(--muted);font-size:0.6rem">${item.size} · ×${item.qty}</span></span>
        <span class="order-review-price">₹${(item.price*item.qty).toLocaleString('en-IN')}</span>
      </div>`).join('')}
      <div style="border-top:1px solid var(--border); margin-top:1rem; padding-top:1rem; display:flex; justify-content:space-between; font-size:0.72rem;">
        <span style="color:var(--muted); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.12em">Total</span>
        <span style="color:var(--accent); font-family:'Cormorant Garamond',serif; font-size:1.4rem">₹${grand.toLocaleString('en-IN')}</span>
      </div>
    </div>`;
}
 
function fmtCard(el) {
  let v = el.value.replace(/\D/g,'').slice(0,16);
  el.value = v.replace(/(.{4})/g,'$1 ').trim();
}
function fmtExpiry(el) {
  let v = el.value.replace(/\D/g,'').slice(0,4);
  if (v.length > 2) v = v.slice(0,2) + ' / ' + v.slice(2);
  el.value = v;
}
 
function placeOrder() {
  const email = document.getElementById('cf-email');
  const fname = document.getElementById('cf-fname');
  if (!email || !email.value || !fname || !fname.value) {
    showToast('Please fill in required fields');
    return;
  }
  const orderNum = 'OB-' + Math.floor(100000 + Math.random() * 900000);
  document.getElementById('order-num').textContent = 'Order #' + orderNum;
  cart = [];
  updateCartCount();
  showPage('success');
}
 
/* ── INIT ── */
renderShop('All');
</script>
</body>
</html>
